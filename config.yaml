interests:
  - name: "底层视觉"
    arxiv_categories: ["cs.CV", "eess.IV"]
    keywords:
      - "super-resolution"
      - "denoising"
      - "deblurring"
      - "image restoration"
      - "image enhancement"
      - "low-light"
      - "HDR"
      - "inpainting"
      - "deraining"
      - "dehazing"
    search_queries:
      - "image super resolution deep learning"
      - "image restoration diffusion model"
      - "image quality enhancement"
      - "image editing"
    description: "图像超分、去噪、去模糊、增强、修复等底层视觉任务"

  - name: "视频算法"
    arxiv_categories: ["cs.CV", "cs.MM"]
    keywords:
      - "video generation"
      - "video editing"
      - "video enhancement"
      - "video super-resolution"
      - "video interpolation"
      - "video quality"
      - "video restoration"
      - "video diffusion"
    search_queries:
      - "video generation diffusion model"
      - "video quality enhancement neural network"
      - "video editing"
    description: "视频生成、编辑、增强、质量评估等"

  - name: "图像生成"
    arxiv_categories: ["cs.CV", "cs.AI"]
    keywords:
      - "text-to-image"
      - "image generation"
      - "image synthesis"
      - "diffusion model"
      - "stable diffusion"
      - "ControlNet"
      - "image-to-image"
      - "inpainting generation"
      - "personalization"
      - "DreamBooth"
      - "LoRA"
      - "IP-Adapter"
    search_queries:
      - "text to image diffusion model"
      - "controllable image generation"
      - "personalized image synthesis"
    description: "文生图、可控生成、个性化生成、扩散模型等"

  - name: "多模态大模型"
    arxiv_categories: ["cs.CV", "cs.CL", "cs.AI"]
    keywords:
      - "multimodal"
      - "vision-language"
      - "VLM"
      - "GPT-4V"
      - "LLaVA"
      - "visual instruction"
      - "image understanding"
      - "visual reasoning"
      - "MLLM"
      - "omni-modal"
    search_queries:
      - "multimodal large language model vision"
      - "visual instruction tuning"
      - "vision language model benchmark"
    description: "多模态大模型、视觉语言模型、图文理解等"

  - name: "AI Agent"
    arxiv_categories: ["cs.AI", "cs.CL"]
    keywords:
      - "AI agent"
      - "tool use"
      - "function calling"
      - "code generation"
      - "autonomous agent"
      - "planning"
      - "reasoning"
      - "chain-of-thought"
      - "self-reflection"
      - "multi-agent"
    search_queries:
      - "autonomous AI agent tool use"
      - "LLM agent planning reasoning"
      - "multi-agent collaboration"
    description: "AI智能体、工具使用、代码生成、自主规划等"

sources:
  arxiv:
    enabled: true
    max_results_per_category: 100
    lookback_days: 3

  hf_daily:
    enabled: true
    lookback_days: 3

  s2_search:
    enabled: true
    limit_per_query: 20

  rss:
    enabled: false
    feeds:
      - name: "HuggingFace Daily Papers"
        url: "https://huggingface.co/papers/rss"
      - name: "PapersWithCode"
        url: "https://paperswithcode.com/latest/rss"

enrichment:
  enabled: true
  timeout: 10
  max_authors_per_paper: 5

filter:
  keyword_threshold: 1
  llm_relevance_threshold: 7
  llm_model: "xiaomi/mimo-v2-pro"
  llm_batch_size: 20

summary:
  enabled: true

output:
  feishu:
    enabled: true
    wiki_space: ""
  feishu_bot:
    enabled: true
    webhook_url_env: "FEISHU_BOT_WEBHOOK_URL"
    test_webhook_url_env: "FEISHU_BOT_WEBHOOK_URL_TEST"
    pages_base_url: "https://yuqiangy.github.io/paper-tracker"
  html:
    enabled: true
    output_dir: "site/"
    title: "Paper Tracker"
    deploy_cmd: "bash deploy.sh"
